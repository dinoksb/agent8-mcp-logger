<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent8 Log Snapshot</title>
    <style>
      :root {
        --bg: #f2efe8;
        --surface: rgba(255, 252, 246, 0.92);
        --surface-strong: #fffaf1;
        --ink: #1c1b19;
        --muted: #625d53;
        --accent: #006d77;
        --accent-soft: #d9f0f2;
        --warning: #c97c00;
        --danger: #b42318;
        --line: rgba(28, 27, 25, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(0, 109, 119, 0.14), transparent 32%),
          radial-gradient(circle at top right, rgba(201, 124, 0, 0.12), transparent 24%),
          linear-gradient(180deg, #f8f4eb 0%, var(--bg) 100%);
      }

      main {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
        padding: 36px 0 56px;
      }

      .hero,
      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(28, 27, 25, 0.08);
        backdrop-filter: blur(10px);
      }

      .hero {
        padding: 28px;
      }

      .eyebrow {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 0.96;
      }

      .subtle {
        color: var(--muted);
        line-height: 1.6;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin-top: 22px;
      }

      .meta-card,
      .summary-card {
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
      }

      .alert {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid rgba(201, 124, 0, 0.24);
        background: rgba(201, 124, 0, 0.08);
        color: var(--ink);
      }

      .alert strong {
        display: block;
        margin-bottom: 6px;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
      }

      .summary-card strong {
        display: block;
        margin-top: 8px;
        font-size: 28px;
      }

      .stack {
        display: grid;
        gap: 18px;
        margin-top: 18px;
      }

      .panel {
        padding: 22px;
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .incidents,
      .runs {
        display: grid;
        gap: 12px;
      }

      .incident {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
      }

      .incident[data-severity="critical"] {
        border-color: rgba(180, 35, 24, 0.3);
      }

      .incident[data-severity="warning"] {
        border-color: rgba(201, 124, 0, 0.3);
      }

      .run-card {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
      }

      .run-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        align-items: flex-start;
      }

      .run-title {
        margin: 8px 0 6px;
        font-size: 18px;
      }

      .run-meta {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
        margin-top: 14px;
      }

      .run-meta div {
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.55);
      }

      .run-meta strong,
      .stage-card strong {
        display: block;
        margin-top: 4px;
      }

      .run-content {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      .info-card {
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.55);
      }

      .prompt-text {
        margin: 10px 0 0;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.55;
      }

      .result-link {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
        word-break: break-all;
      }

      .result-preview {
        display: block;
        width: 100%;
        max-width: 320px;
        margin-top: 12px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
        object-fit: contain;
      }

      .run-links {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
      }

      .run-links a {
        display: inline-flex;
        align-items: center;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      details {
        margin-top: 14px;
      }

      summary {
        cursor: pointer;
        font-weight: 700;
      }

      .stage-list {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .stage-card {
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.55);
      }

      .links {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .links a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        background: var(--accent-soft);
        color: var(--accent);
      }

      .pill.warning {
        background: rgba(201, 124, 0, 0.12);
        color: var(--warning);
      }

      .pill.critical {
        background: rgba(180, 35, 24, 0.12);
        color: var(--danger);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      td code {
        font-family: "Cascadia Code", "Consolas", monospace;
        font-size: 12px;
      }

      .empty {
        padding: 16px;
        border-radius: 18px;
        background: var(--surface-strong);
        border: 1px dashed var(--line);
        color: var(--muted);
      }

      @media (max-width: 700px) {
        main {
          width: min(100% - 20px, 1100px);
          padding-top: 20px;
        }

        .hero,
        .panel {
          border-radius: 20px;
        }

        table,
        thead,
        tbody,
        tr,
        th,
        td {
          display: block;
        }

        thead {
          display: none;
        }

        tr {
          padding: 14px 0;
          border-bottom: 1px solid var(--line);
        }

        td {
          padding: 6px 0;
          border: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <span class="eyebrow">Static Snapshot</span>
        <h1>Agent8 Log Inspector</h1>
        <p class="subtle">
          Fixed-time operational report for Agent8 Cloud Run logs. This page is
          phase 1 output and is designed to keep the payload contract stable for
          a later real-time backend.
        </p>
        <div id="meta" class="meta"></div>
        <div id="alerts"></div>
        <div class="links">
          <a href="./data/report.json" target="_blank" rel="noreferrer">Open report.json</a>
          <a href="./data/runs.json" target="_blank" rel="noreferrer">Open runs.json</a>
        </div>
      </section>

      <section class="stack">
        <div class="panel">
          <h2>Summary</h2>
          <div id="summary" class="summary-grid"></div>
        </div>

        <div class="panel">
          <h2>Diagnostics</h2>
          <div id="diagnostics" class="summary-grid"></div>
          <div id="diagnostic-notes" class="stack"></div>
        </div>

        <div class="panel">
          <h2>Incidents</h2>
          <div id="incidents" class="incidents"></div>
        </div>

        <div class="panel">
          <h2>Runs</h2>
          <div id="runs" class="runs"></div>
        </div>
      </section>
    </main>

    <script type="module">
      const metaNode = document.querySelector("#meta");
      const alertsNode = document.querySelector("#alerts");
      const summaryNode = document.querySelector("#summary");
      const diagnosticsNode = document.querySelector("#diagnostics");
      const diagnosticNotesNode = document.querySelector("#diagnostic-notes");
      const incidentsNode = document.querySelector("#incidents");
      const runsNode = document.querySelector("#runs");

      const fmt = (value) => (value ? new Date(value).toLocaleString() : "-");
      const labelCase = (value) => value.replaceAll("_", " ");
      const fmtMs = (value) =>
        typeof value === "number" ? `${(value / 1000).toFixed(1)}s` : "-";
      const flowPrefixes = {
        image_asset_generate: "[ImageGeneration]",
        image_variation_generate: "[ImageVariation]",
        spritesheet_generate: "[SpritesheetGeneration]",
        spritesheet_variation_generate: "[SpritesheetVariation]",
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function isHttpUrl(value) {
        if (!value) {
          return false;
        }

        try {
          const parsed = new URL(value);
          return parsed.protocol === "http:" || parsed.protocol === "https:";
        } catch {
          return false;
        }
      }

      function escapeLogsQueryValue(value) {
        return String(value).replaceAll("\\", "\\\\").replaceAll('"', '\\"');
      }

      function buildLogsExplorerUrl(run, report) {
        const projectId = run.projectId ?? report.query.projectId;
        const serviceName = run.serviceName ?? report.query.serviceName;

        if (!projectId || !serviceName) {
          return null;
        }

        const filters = [
          'resource.type="cloud_run_revision"',
          `resource.labels.service_name="${escapeLogsQueryValue(serviceName)}"`,
        ];

        if (run.location ?? report.query.location) {
          filters.push(
            `resource.labels.location="${escapeLogsQueryValue(run.location ?? report.query.location)}"`,
          );
        }

        if (run.revisionName) {
          filters.push(
            `resource.labels.revision_name="${escapeLogsQueryValue(run.revisionName)}"`,
          );
        }

        const identityClauses = [];

        if (run.operationId) {
          const operationId = escapeLogsQueryValue(run.operationId);
          identityClauses.push(`jsonPayload.operationId="${operationId}"`);
          identityClauses.push(`textPayload:"${operationId}"`);
        }

        if (run.requestId) {
          const requestId = escapeLogsQueryValue(run.requestId);
          identityClauses.push(`jsonPayload.requestId="${requestId}"`);
          identityClauses.push(`textPayload:"${requestId}"`);
        }

        if (run.trace) {
          identityClauses.push(`trace="${escapeLogsQueryValue(run.trace)}"`);
        }

        if (!identityClauses.length && flowPrefixes[run.toolFlow]) {
          identityClauses.push(`textPayload:"${escapeLogsQueryValue(flowPrefixes[run.toolFlow])}"`);
        }

        if (identityClauses.length) {
          filters.push(`(${identityClauses.join(" OR ")})`);
        }

        const startedAt = new Date(run.startedAt);
        const endedAt = new Date(run.endedAt ?? run.startedAt);

        if (!Number.isNaN(startedAt.getTime())) {
          filters.push(
            `timestamp>="${new Date(startedAt.getTime() - 60_000).toISOString()}"`,
          );
        }

        if (!Number.isNaN(endedAt.getTime())) {
          filters.push(
            `timestamp<="${new Date(endedAt.getTime() + 60_000).toISOString()}"`,
          );
        }

        return `https://console.cloud.google.com/logs/query;query=${encodeURIComponent(filters.join("\n"))}?project=${encodeURIComponent(projectId)}`;
      }

      function renderSummary(report) {
        const cards = [
          ["Total runs", report.summary.totalRuns],
          ["Completed", report.summary.completedRuns],
          ["Failed", report.summary.failedRuns],
          ["Handed off", report.summary.handedOffRuns],
          ["Queue timeouts", report.summary.queueTimeouts],
          ["Incidents", report.incidents.length],
        ];

        summaryNode.innerHTML = cards
          .map(
            ([label, value]) => `
              <article class="summary-card">
                <div class="subtle">${label}</div>
                <strong>${value}</strong>
              </article>
            `,
          )
          .join("");
      }

      function renderAlerts(report) {
        const alerts = [];

        if (report.query.source === "sample") {
          alerts.push(`
            <div class="alert">
              <strong>Sample snapshot is deployed</strong>
              This page is currently showing bundled demo data, not live Cloud Logging results. Run the workflow with <code>snapshot_source=gcp</code> to publish real logs.
            </div>
          `);
        }

        if (report.diagnostics?.fetchedEntryCount === 0) {
          alerts.push(`
            <div class="alert">
              <strong>Cloud Logging returned zero entries</strong>
              The current service, region, or time window did not produce matching logs for this snapshot.
            </div>
          `);
        }

        alertsNode.innerHTML = alerts.join("");
      }

      function renderMeta(report) {
        const meta = [
          ["Generated", fmt(report.generatedAt)],
          ["Coverage start", fmt(report.coveredFrom)],
          ["Coverage end", fmt(report.coveredTo)],
          ["Source", report.query.source],
          ["Service", report.query.serviceName ?? "sample-service"],
          ["Project", report.query.projectId ?? "sample-project"],
          ["Location", report.query.location ?? "not-set"],
        ];

        metaNode.innerHTML = meta
          .map(
            ([label, value]) => `
              <article class="meta-card">
                <div class="subtle">${label}</div>
                <strong>${value}</strong>
              </article>
            `,
          )
          .join("");
      }

      function renderDiagnostics(report) {
        const diagnostics = report.diagnostics;
        if (!diagnostics) {
          diagnosticsNode.innerHTML =
            '<div class="empty">No diagnostics were included in this snapshot payload.</div>';
          diagnosticNotesNode.innerHTML = "";
          return;
        }

        const cards = [
          ["Fetched entries", diagnostics.fetchedEntryCount],
          ["Parsed events", diagnostics.parsedEventCount],
          ["Recognized events", diagnostics.recognizedEventCount],
          ["Correlated runs", diagnostics.runCount],
          ["Fetch strategy", diagnostics.fetchStrategy],
        ];

        diagnosticsNode.innerHTML = cards
          .map(
            ([label, value]) => `
              <article class="summary-card">
                <div class="subtle">${label}</div>
                <strong>${value}</strong>
              </article>
            `,
          )
          .join("");

        diagnosticNotesNode.innerHTML = diagnostics.notes.length
          ? diagnostics.notes
              .map((note) => `<div class="empty">${note}</div>`)
              .join("")
          : "";
      }

      function renderIncidents(report) {
        if (!report.incidents.length) {
          incidentsNode.innerHTML =
            '<div class="empty">No incidents were classified for this snapshot.</div>';
          return;
        }

        incidentsNode.innerHTML = report.incidents
          .map(
            (incident) => `
              <article class="incident" data-severity="${incident.severity}">
                <div class="pill ${incident.severity}">${incident.severity}</div>
                <h3>${escapeHtml(incident.summary)}</h3>
                <p class="subtle">${escapeHtml(incident.explanation)}</p>
                <p class="subtle"><strong>Run:</strong> <code>${escapeHtml(incident.runId)}</code></p>
              </article>
            `,
          )
          .join("");
      }

      function renderRuns(report) {
        if (!report.runs.length) {
          const diagnostics = report.diagnostics;
          const reason =
            diagnostics?.fetchedEntryCount === 0
              ? "Cloud Logging returned zero entries for this query. Check service name, region, and time window."
              : diagnostics?.recognizedEventCount === 0
                ? "Logs were fetched, but the parser recognized zero Agent8 events. Live log patterns likely differ from the current parser rules."
                : "No runs were found for the selected window.";

          runsNode.innerHTML =
            `<div class="empty">${reason}</div>`;
          return;
        }

        runsNode.innerHTML = report.runs
          .map((run) => {
            const resultUrl = isHttpUrl(run.resultUrl) ? run.resultUrl : null;
            const logsExplorerUrl = buildLogsExplorerUrl(run, report);

            return `
              <article class="run-card">
                <div class="run-head">
                  <div>
                    <div class="pill ${run.status === "failed" ? "critical" : run.status === "handed_off" ? "warning" : ""}">${labelCase(run.status)}</div>
                    <h3 class="run-title">${labelCase(run.toolFlow)}</h3>
                    <div class="subtle"><code>${escapeHtml(run.runId)}</code></div>
                  </div>
                  <div class="subtle">
                    Started: ${fmt(run.startedAt)}<br />
                    Ended: ${run.endedAt ? fmt(run.endedAt) : "-"}<br />
                    Total: ${fmtMs(run.totalDurationMs)}
                  </div>
                </div>

                <div class="run-meta">
                  <div>
                    <span class="subtle">Providers</span>
                    <strong>${run.providerChain.length ? escapeHtml(run.providerChain.join(" -> ")) : "-"}</strong>
                  </div>
                  <div>
                    <span class="subtle">Bottleneck</span>
                    <strong>${run.bottleneckStage ? `${labelCase(run.bottleneckStage)} (${fmtMs(run.bottleneckDurationMs)})` : "-"}</strong>
                  </div>
                  <div>
                    <span class="subtle">Operation / Request</span>
                    <strong><code>${escapeHtml(run.operationId ?? "-")}</code>${run.requestId ? `<br /><code>${escapeHtml(run.requestId)}</code>` : ""}</strong>
                  </div>
                  <div>
                    <span class="subtle">Failure / Timeout</span>
                    <strong>${run.failureKind ? labelCase(run.failureKind) : "-"}${run.timeoutKind ? `<br />${labelCase(run.timeoutKind)}` : ""}</strong>
                  </div>
                </div>

                ${(run.prompt || resultUrl)
                  ? `
                    <div class="run-content">
                      ${
                        run.prompt
                          ? `
                            <div class="info-card">
                              <span class="subtle">Prompt</span>
                              <p class="prompt-text">${escapeHtml(run.prompt)}</p>
                            </div>
                          `
                          : ""
                      }
                      ${
                        resultUrl
                          ? `
                            <div class="info-card">
                              <span class="subtle">Result asset</span>
                              <div>
                                <a class="result-link" href="${escapeHtml(resultUrl)}" target="_blank" rel="noreferrer">${escapeHtml(resultUrl)}</a>
                              </div>
                              ${
                                run.status === "completed"
                                  ? `
                                    <a href="${escapeHtml(resultUrl)}" target="_blank" rel="noreferrer">
                                      <img class="result-preview" src="${escapeHtml(resultUrl)}" alt="${escapeHtml(run.runId)} result preview" loading="lazy" />
                                    </a>
                                  `
                                  : ""
                              }
                            </div>
                          `
                          : ""
                      }
                    </div>
                  `
                  : ""
                }

                ${(resultUrl || logsExplorerUrl)
                  ? `
                    <div class="run-links">
                      ${
                        resultUrl
                          ? `<a href="${escapeHtml(resultUrl)}" target="_blank" rel="noreferrer">Open result URL</a>`
                          : ""
                      }
                      ${
                        logsExplorerUrl
                          ? `<a href="${escapeHtml(logsExplorerUrl)}" target="_blank" rel="noreferrer">Open GCP logs</a>`
                          : ""
                      }
                    </div>
                  `
                  : ""
                }

                <details>
                  <summary>Stages (${run.stages.length})</summary>
                  <div class="stage-list">
                    ${run.stages
                      .map(
                        (stage) => `
                          <div class="stage-card">
                            <span class="subtle">${labelCase(stage.stage)}</span>
                            <strong>${fmtMs(stage.durationMs)}</strong>
                            <div class="subtle">
                              Start: ${stage.startedAt ? fmt(stage.startedAt) : "-"}<br />
                              End: ${stage.endedAt ? fmt(stage.endedAt) : "-"}<br />
                              Evidence events: ${stage.sourceEventIds.length}
                            </div>
                          </div>
                        `,
                      )
                      .join("")}
                  </div>
                </details>
              </article>
            `;
          })
          .join("");
      }

      async function boot() {
        try {
          const response = await fetch("./data/report.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Failed to load snapshot: ${response.status}`);
          }

          const report = await response.json();
          renderMeta(report);
          renderAlerts(report);
          renderSummary(report);
          renderDiagnostics(report);
          renderIncidents(report);
          renderRuns(report);
        } catch (error) {
          alertsNode.innerHTML = "";
          summaryNode.innerHTML =
            '<div class="empty">Snapshot data is not available yet. Run the snapshot build script or GitHub Actions workflow first.</div>';
          diagnosticsNode.innerHTML = "";
          diagnosticNotesNode.innerHTML = "";
          incidentsNode.innerHTML = "";
          runsNode.innerHTML = "";
          metaNode.innerHTML = `
            <article class="meta-card">
              <div class="subtle">Status</div>
              <strong>Snapshot missing</strong>
            </article>
          `;
          console.error(error);
        }
      }

      boot();
    </script>
  </body>
</html>
