<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent8 Log Snapshot</title>
    <style>
      :root {
        --bg: #f2efe8;
        --surface: rgba(255, 252, 246, 0.92);
        --surface-strong: #fffaf1;
        --ink: #1c1b19;
        --muted: #625d53;
        --accent: #006d77;
        --accent-soft: #d9f0f2;
        --warning: #c97c00;
        --danger: #b42318;
        --line: rgba(28, 27, 25, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(0, 109, 119, 0.14), transparent 32%),
          radial-gradient(circle at top right, rgba(201, 124, 0, 0.12), transparent 24%),
          linear-gradient(180deg, #f8f4eb 0%, var(--bg) 100%);
      }

      main {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
        padding: 36px 0 56px;
      }

      .hero,
      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(28, 27, 25, 0.08);
        backdrop-filter: blur(10px);
      }

      .hero {
        padding: 28px;
      }

      .eyebrow {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 0.96;
      }

      .subtle {
        color: var(--muted);
        line-height: 1.6;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin-top: 22px;
      }

      .meta-card,
      .summary-card {
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
      }

      .summary-card strong {
        display: block;
        margin-top: 8px;
        font-size: 28px;
      }

      .stack {
        display: grid;
        gap: 18px;
        margin-top: 18px;
      }

      .panel {
        padding: 22px;
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .incidents,
      .runs {
        display: grid;
        gap: 12px;
      }

      .incident {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
      }

      .incident[data-severity="critical"] {
        border-color: rgba(180, 35, 24, 0.3);
      }

      .incident[data-severity="warning"] {
        border-color: rgba(201, 124, 0, 0.3);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        background: var(--accent-soft);
        color: var(--accent);
      }

      .pill.warning {
        background: rgba(201, 124, 0, 0.12);
        color: var(--warning);
      }

      .pill.critical {
        background: rgba(180, 35, 24, 0.12);
        color: var(--danger);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      td code {
        font-family: "Cascadia Code", "Consolas", monospace;
        font-size: 12px;
      }

      .empty {
        padding: 16px;
        border-radius: 18px;
        background: var(--surface-strong);
        border: 1px dashed var(--line);
        color: var(--muted);
      }

      @media (max-width: 700px) {
        main {
          width: min(100% - 20px, 1100px);
          padding-top: 20px;
        }

        .hero,
        .panel {
          border-radius: 20px;
        }

        table,
        thead,
        tbody,
        tr,
        th,
        td {
          display: block;
        }

        thead {
          display: none;
        }

        tr {
          padding: 14px 0;
          border-bottom: 1px solid var(--line);
        }

        td {
          padding: 6px 0;
          border: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <span class="eyebrow">Static Snapshot</span>
        <h1>Agent8 Log Inspector</h1>
        <p class="subtle">
          Fixed-time operational report for Agent8 Cloud Run logs. This page is
          phase 1 output and is designed to keep the payload contract stable for
          a later real-time backend.
        </p>
        <div id="meta" class="meta"></div>
      </section>

      <section class="stack">
        <div class="panel">
          <h2>Summary</h2>
          <div id="summary" class="summary-grid"></div>
        </div>

        <div class="panel">
          <h2>Incidents</h2>
          <div id="incidents" class="incidents"></div>
        </div>

        <div class="panel">
          <h2>Runs</h2>
          <div id="runs" class="runs"></div>
        </div>
      </section>
    </main>

    <script type="module">
      const metaNode = document.querySelector("#meta");
      const summaryNode = document.querySelector("#summary");
      const incidentsNode = document.querySelector("#incidents");
      const runsNode = document.querySelector("#runs");

      const fmt = (value) => new Date(value).toLocaleString();
      const labelCase = (value) => value.replaceAll("_", " ");

      function renderSummary(report) {
        const cards = [
          ["Total runs", report.summary.totalRuns],
          ["Completed", report.summary.completedRuns],
          ["Failed", report.summary.failedRuns],
          ["Handed off", report.summary.handedOffRuns],
          ["Queue timeouts", report.summary.queueTimeouts],
          ["Incidents", report.incidents.length],
        ];

        summaryNode.innerHTML = cards
          .map(
            ([label, value]) => `
              <article class="summary-card">
                <div class="subtle">${label}</div>
                <strong>${value}</strong>
              </article>
            `,
          )
          .join("");
      }

      function renderMeta(report) {
        const meta = [
          ["Generated", fmt(report.generatedAt)],
          ["Coverage start", fmt(report.coveredFrom)],
          ["Coverage end", fmt(report.coveredTo)],
          ["Source", report.query.source],
          ["Service", report.query.serviceName ?? "sample-service"],
          ["Project", report.query.projectId ?? "sample-project"],
        ];

        metaNode.innerHTML = meta
          .map(
            ([label, value]) => `
              <article class="meta-card">
                <div class="subtle">${label}</div>
                <strong>${value}</strong>
              </article>
            `,
          )
          .join("");
      }

      function renderIncidents(report) {
        if (!report.incidents.length) {
          incidentsNode.innerHTML =
            '<div class="empty">No incidents were classified for this snapshot.</div>';
          return;
        }

        incidentsNode.innerHTML = report.incidents
          .map(
            (incident) => `
              <article class="incident" data-severity="${incident.severity}">
                <div class="pill ${incident.severity}">${incident.severity}</div>
                <h3>${incident.summary}</h3>
                <p class="subtle">${incident.explanation}</p>
                <p class="subtle"><strong>Run:</strong> <code>${incident.runId}</code></p>
              </article>
            `,
          )
          .join("");
      }

      function renderRuns(report) {
        if (!report.runs.length) {
          runsNode.innerHTML =
            '<div class="empty">No runs were found for the selected window.</div>';
          return;
        }

        runsNode.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Run</th>
                <th>Flow</th>
                <th>Status</th>
                <th>Bottleneck</th>
                <th>Total</th>
                <th>Provider chain</th>
              </tr>
            </thead>
            <tbody>
              ${report.runs
                .map(
                  (run) => `
                    <tr>
                      <td><code>${run.runId}</code></td>
                      <td>${labelCase(run.toolFlow)}</td>
                      <td>${labelCase(run.status)}</td>
                      <td>${run.bottleneckStage ? labelCase(run.bottleneckStage) : "-"}</td>
                      <td>${run.totalDurationMs ? `${(run.totalDurationMs / 1000).toFixed(1)}s` : "-"}</td>
                      <td>${run.providerChain.length ? run.providerChain.join(" -> ") : "-"}</td>
                    </tr>
                  `,
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      async function boot() {
        try {
          const response = await fetch("./data/report.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Failed to load snapshot: ${response.status}`);
          }

          const report = await response.json();
          renderMeta(report);
          renderSummary(report);
          renderIncidents(report);
          renderRuns(report);
        } catch (error) {
          summaryNode.innerHTML =
            '<div class="empty">Snapshot data is not available yet. Run the snapshot build script or GitHub Actions workflow first.</div>';
          incidentsNode.innerHTML = "";
          runsNode.innerHTML = "";
          metaNode.innerHTML = `
            <article class="meta-card">
              <div class="subtle">Status</div>
              <strong>Snapshot missing</strong>
            </article>
          `;
          console.error(error);
        }
      }

      boot();
    </script>
  </body>
</html>
