<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent8 Log Snapshot</title>
    <style>
      :root {
        --bg: #f2efe8;
        --surface: rgba(255, 252, 246, 0.92);
        --surface-strong: #fffaf1;
        --ink: #1c1b19;
        --muted: #625d53;
        --accent: #006d77;
        --accent-soft: #d9f0f2;
        --warning: #c97c00;
        --danger: #b42318;
        --line: rgba(28, 27, 25, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(0, 109, 119, 0.14), transparent 32%),
          radial-gradient(circle at top right, rgba(201, 124, 0, 0.12), transparent 24%),
          linear-gradient(180deg, #f8f4eb 0%, var(--bg) 100%);
      }

      main {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
        padding: 36px 0 56px;
      }

      .hero,
      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(28, 27, 25, 0.08);
        backdrop-filter: blur(10px);
      }

      .hero {
        padding: 28px;
      }

      .eyebrow {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 0.96;
      }

      .subtle {
        color: var(--muted);
        line-height: 1.6;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin-top: 22px;
      }

      .meta-card,
      .summary-card {
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
      }

      .alert {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid rgba(201, 124, 0, 0.24);
        background: rgba(201, 124, 0, 0.08);
        color: var(--ink);
      }

      .alert strong {
        display: block;
        margin-bottom: 6px;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
      }

      .summary-card strong {
        display: block;
        margin-top: 8px;
        font-size: 28px;
      }

      .stack {
        display: grid;
        gap: 18px;
        margin-top: 18px;
      }

      .panel {
        padding: 22px;
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      .incidents,
      .runs {
        display: grid;
        gap: 12px;
      }

      .incident {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
      }

      .incident-link {
        display: block;
        color: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      .incident[data-severity="critical"] {
        border-color: rgba(180, 35, 24, 0.3);
      }

      .incident[data-severity="warning"] {
        border-color: rgba(201, 124, 0, 0.3);
      }

      .run-card {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
        scroll-margin-top: 24px;
      }

      .run-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        align-items: flex-start;
      }

      .run-title {
        margin: 8px 0 6px;
        font-size: 18px;
      }

      .run-meta {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
        margin-top: 14px;
      }

      .run-meta div {
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.55);
      }

      .run-meta strong,
      .stage-card strong {
        display: block;
        margin-top: 4px;
      }

      .run-content {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 12px;
        margin-top: 14px;
      }

      .info-card {
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.55);
      }

      .prompt-text {
        margin: 10px 0 0;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.55;
      }

      .result-link {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
        word-break: break-all;
      }

      .result-preview {
        display: block;
        width: 100%;
        max-width: 320px;
        margin-top: 12px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
        object-fit: contain;
      }

      .run-links {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
      }

      .run-links a {
        display: inline-flex;
        align-items: center;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      details {
        margin-top: 14px;
      }

      summary {
        cursor: pointer;
        font-weight: 700;
      }

      .stage-list {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .stage-card {
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.55);
      }

      .event-list {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .event-card {
        margin-top: 0;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.72);
      }

      .event-summary {
        display: grid;
        gap: 8px;
      }

      .event-summary-meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .event-summary-message {
        font-weight: 700;
        line-height: 1.45;
        word-break: break-word;
      }

      .event-body {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }

      .field {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.78);
      }

      .field strong {
        display: block;
        margin-top: 6px;
        word-break: break-word;
      }

      .compact {
        padding: 12px 14px;
      }

      .error-card {
        border-color: rgba(180, 35, 24, 0.22);
      }

      .metadata-block {
        margin: 10px 0 0;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.85);
        color: var(--ink);
        font-family: "Cascadia Code", "Consolas", monospace;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        overflow: auto;
      }

      .nested-details {
        margin-top: 10px;
      }

      .links {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .links a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        background: var(--accent-soft);
        color: var(--accent);
      }

      .pill.warning {
        background: rgba(201, 124, 0, 0.12);
        color: var(--warning);
      }

      .pill.critical {
        background: rgba(180, 35, 24, 0.12);
        color: var(--danger);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      td code {
        font-family: "Cascadia Code", "Consolas", monospace;
        font-size: 12px;
      }

      .empty {
        padding: 16px;
        border-radius: 18px;
        background: var(--surface-strong);
        border: 1px dashed var(--line);
        color: var(--muted);
      }

      @media (max-width: 700px) {
        main {
          width: min(100% - 20px, 1100px);
          padding-top: 20px;
        }

        .hero,
        .panel {
          border-radius: 20px;
        }

        table,
        thead,
        tbody,
        tr,
        th,
        td {
          display: block;
        }

        thead {
          display: none;
        }

        tr {
          padding: 14px 0;
          border-bottom: 1px solid var(--line);
        }

        td {
          padding: 6px 0;
          border: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <span class="eyebrow">Static Snapshot</span>
        <h1>Agent8 Log Inspector</h1>
        <p class="subtle">
          Fixed-time operational report for Agent8 Cloud Run logs. This page is
          phase 1 output and is designed to keep the payload contract stable for
          a later real-time backend.
        </p>
        <div id="meta" class="meta"></div>
        <div id="alerts"></div>
        <div class="links">
          <a href="./data/report.json" target="_blank" rel="noreferrer">Open report.json</a>
          <a href="./data/runs.json" target="_blank" rel="noreferrer">Open runs.json</a>
        </div>
      </section>

      <section class="stack">
        <div class="panel">
          <h2>Summary</h2>
          <div id="summary" class="summary-grid"></div>
        </div>

        <div class="panel">
          <h2>Diagnostics</h2>
          <div id="diagnostics" class="summary-grid"></div>
          <div id="diagnostic-notes" class="stack"></div>
        </div>

        <div class="panel">
          <h2>Incidents</h2>
          <div id="incidents" class="incidents"></div>
        </div>

        <div class="panel">
          <h2>Runs</h2>
          <div id="runs" class="runs"></div>
        </div>
      </section>
    </main>

    <script type="module">
      const metaNode = document.querySelector("#meta");
      const alertsNode = document.querySelector("#alerts");
      const summaryNode = document.querySelector("#summary");
      const diagnosticsNode = document.querySelector("#diagnostics");
      const diagnosticNotesNode = document.querySelector("#diagnostic-notes");
      const incidentsNode = document.querySelector("#incidents");
      const runsNode = document.querySelector("#runs");

      const fmt = (value) => (value ? new Date(value).toLocaleString() : "-");
      const labelCase = (value) => value.replaceAll("_", " ");
      const fmtMs = (value) =>
        typeof value === "number" ? `${(value / 1000).toFixed(1)}s` : "-";
      const flowPrefixes = {
        image_asset_generate: "[ImageGeneration]",
        image_variation_generate: "[ImageVariation]",
        spritesheet_generate: "[SpritesheetGeneration]",
        spritesheet_variation_generate: "[SpritesheetVariation]",
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function isHttpUrl(value) {
        if (!value) {
          return false;
        }

        try {
          const parsed = new URL(value);
          return parsed.protocol === "http:" || parsed.protocol === "https:";
        } catch {
          return false;
        }
      }

      function escapeLogsQueryValue(value) {
        return String(value).replaceAll("\\", "\\\\").replaceAll('"', '\\"');
      }

      function buildLogsExplorerUrl(run, report) {
        const projectId = run.projectId ?? report.query.projectId;
        const serviceName = run.serviceName ?? report.query.serviceName;

        if (!projectId || !serviceName) {
          return null;
        }

        const filters = [
          'resource.type="cloud_run_revision"',
          `resource.labels.service_name="${escapeLogsQueryValue(serviceName)}"`,
        ];

        if (run.location ?? report.query.location) {
          filters.push(
            `resource.labels.location="${escapeLogsQueryValue(run.location ?? report.query.location)}"`,
          );
        }

        if (run.revisionName) {
          filters.push(
            `resource.labels.revision_name="${escapeLogsQueryValue(run.revisionName)}"`,
          );
        }

        const identityClauses = [];
        const exactInsertIds = Array.isArray(run.evidenceRawEntryIds)
          ? run.evidenceRawEntryIds.filter(
              (value) =>
                typeof value === "string" &&
                value &&
                !value.startsWith("sample-") &&
                !value.startsWith("raw-entry-") &&
                !value.startsWith("gcp-entry-"),
            )
          : [];

        if (exactInsertIds.length) {
          filters.push(
            `(${exactInsertIds
              .map((insertId) => `insertId="${escapeLogsQueryValue(insertId)}"`)
              .join(" OR ")})`,
          );
        }

        if (!exactInsertIds.length && run.operationId) {
          const operationId = escapeLogsQueryValue(run.operationId);
          identityClauses.push(`jsonPayload.operationId="${operationId}"`);
          identityClauses.push(`jsonPayload.operation_id="${operationId}"`);
          identityClauses.push(`textPayload:"${operationId}"`);
        }

        if (!exactInsertIds.length && run.requestId) {
          const requestId = escapeLogsQueryValue(run.requestId);
          identityClauses.push(`jsonPayload.requestId="${requestId}"`);
          identityClauses.push(`jsonPayload.request_id="${requestId}"`);
          identityClauses.push(`textPayload:"${requestId}"`);
        }

        if (!exactInsertIds.length && run.trace) {
          identityClauses.push(`trace="${escapeLogsQueryValue(run.trace)}"`);
        }

        if (!exactInsertIds.length && !identityClauses.length && flowPrefixes[run.toolFlow]) {
          identityClauses.push(`textPayload:"${escapeLogsQueryValue(flowPrefixes[run.toolFlow])}"`);
          identityClauses.push(`jsonPayload.message:"${escapeLogsQueryValue(flowPrefixes[run.toolFlow])}"`);
        }

        if (!exactInsertIds.length && identityClauses.length) {
          filters.push(`(${identityClauses.join(" OR ")})`);
        }

        const startedAt = new Date(run.startedAt);
        const endedAt = new Date(run.endedAt ?? run.startedAt);
        const paddingMs = exactInsertIds.length ? 15_000 : 60_000;

        if (!Number.isNaN(startedAt.getTime())) {
          filters.push(
            `timestamp>="${new Date(startedAt.getTime() - paddingMs).toISOString()}"`,
          );
        }

        if (!Number.isNaN(endedAt.getTime())) {
          filters.push(
            `timestamp<="${new Date(endedAt.getTime() + paddingMs).toISOString()}"`,
          );
        }

        return `https://console.cloud.google.com/logs/query;query=${encodeURIComponent(filters.join("\n"))}?project=${encodeURIComponent(projectId)}`;
      }

      function hasValue(value) {
        return value !== undefined && value !== null && value !== "";
      }

      function toRunAnchorId(runId) {
        return `run-${String(runId ?? "")
          .toLowerCase()
          .replaceAll(/[^a-z0-9]+/g, "-")
          .replaceAll(/^-+|-+$/g, "")}`;
      }

      function translateSeverity(value) {
        const lower = String(value ?? "").toLowerCase();
        if (lower === "warning") {
          return "경고";
        }

        if (lower === "critical") {
          return "치명";
        }

        if (lower === "info") {
          return "정보";
        }

        return value;
      }

      function translateIncidentSummary(value) {
        const summaryMap = {
          "provider request is slower than baseline": "프로바이더 요청이 기준보다 느립니다",
          "primary provider failed before fallback": "기본 프로바이더가 실패해 폴백으로 전환되었습니다",
          "fal queue backlog detected": "fal 큐 적체가 감지되었습니다",
          "spritesheet analysis is slower than baseline": "스프라이트시트 분석이 기준보다 느립니다",
          "upload stage is slower than baseline": "업로드 단계가 기준보다 느립니다",
          "reference fetch is slower than baseline": "레퍼런스 이미지 가져오기가 기준보다 느립니다",
        };

        return summaryMap[value] ?? value;
      }

      function translateIncidentExplanation(value) {
        const explanationMap = {
          "The provider generation stage exceeded the configured threshold and dominated the run duration.":
            "프로바이더 생성 단계가 설정된 임계값을 넘겼고, 전체 실행 시간의 대부분을 차지했습니다.",
          "The primary model failed and the run moved to a fallback path.":
            "기본 모델이 실패해 이 실행은 폴백 경로로 전환되었습니다.",
          "The run stayed in IN_QUEUE long enough to match the current queue backlog timeout rule.":
            "이 실행은 IN_QUEUE 상태에 오래 머물러 현재 큐 적체 타임아웃 규칙에 해당합니다.",
          "The spritesheet analysis stage exceeded the configured threshold and dominated the run duration.":
            "스프라이트시트 분석 단계가 설정된 임계값을 넘겼고, 전체 실행 시간의 대부분을 차지했습니다.",
          "The upload stage exceeded the configured threshold and dominated the run duration.":
            "업로드 단계가 설정된 임계값을 넘겼고, 전체 실행 시간의 대부분을 차지했습니다.",
          "The reference fetch stage exceeded the configured threshold and dominated the run duration.":
            "레퍼런스 이미지 가져오기 단계가 설정된 임계값을 넘겼고, 전체 실행 시간의 대부분을 차지했습니다.",
        };

        return explanationMap[value] ?? value;
      }

      function severityTone(value) {
        const lower = String(value ?? "").toLowerCase();
        if (lower === "warning") {
          return "warning";
        }

        if (["error", "critical", "alert", "emergency"].includes(lower)) {
          return "critical";
        }

        return "";
      }

      function renderValue(value, options = {}) {
        const escaped = escapeHtml(String(value));

        if (options.link && isHttpUrl(value)) {
          return `<a class="result-link" href="${escaped}" target="_blank" rel="noreferrer">${escaped}</a>`;
        }

        if (options.code) {
          return `<code>${escaped}</code>`;
        }

        return escaped;
      }

      function renderField(label, value, options = {}) {
        if (!hasValue(value)) {
          return "";
        }

        return `
          <div class="field">
            <span class="subtle">${escapeHtml(label)}</span>
            <strong>${renderValue(value, options)}</strong>
          </div>
        `;
      }

      function renderEventMetadata(event) {
        if (!event?.metadata || !Object.keys(event.metadata).length) {
          return "";
        }

        return `
          <details class="nested-details">
            <summary>Metadata (${Object.keys(event.metadata).length})</summary>
            <pre class="metadata-block">${escapeHtml(JSON.stringify(event.metadata, null, 2))}</pre>
          </details>
        `;
      }

      function renderEvidenceEvent(event) {
        const stageTone =
          event.stage === "failed"
            ? "critical"
            : event.stage === "queue_wait" || event.stage === "status_poll"
              ? "warning"
              : "";
        const imageSize =
          hasValue(event.width) || hasValue(event.height)
            ? `${hasValue(event.width) ? event.width : "?"} x ${hasValue(event.height) ? event.height : "?"}`
            : null;
        const spriteGrid =
          hasValue(event.rows) || hasValue(event.cols)
            ? `${hasValue(event.rows) ? event.rows : "?"} x ${hasValue(event.cols) ? event.cols : "?"}`
            : null;

        return `
          <details class="event-card">
            <summary>
              <div class="event-summary">
                <div class="event-summary-meta">
                  <span class="pill ${stageTone}">${labelCase(event.stage)}</span>
                  <span class="pill ${severityTone(event.severity)}">${escapeHtml(String(event.severity).toLowerCase())}</span>
                  <span class="subtle">${fmt(event.timestamp)}</span>
                </div>
                <div class="event-summary-message">${escapeHtml(event.message)}</div>
              </div>
            </summary>
            <div class="event-body">
              <div class="field-grid">
                ${renderField("Event ID", event.eventId, { code: true })}
                ${renderField("Raw entry ID", event.rawEntryId, { code: true })}
                ${renderField("Insert ID", event.insertId, { code: true })}
                ${renderField("Tool flow", labelCase(event.toolFlow))}
                ${renderField("Stage", labelCase(event.stage))}
                ${renderField("Phase", event.phase)}
                ${renderField("Provider", event.provider)}
                ${renderField("Model", event.model)}
                ${renderField("Operation ID", event.operationId, { code: true })}
                ${renderField("Request ID", event.requestId, { code: true })}
                ${renderField("Trace", event.trace, { code: true })}
                ${renderField("Span ID", event.spanId, { code: true })}
                ${renderField("Status", event.status)}
                ${renderField("Duration", fmtMs(event.durationMs))}
                ${renderField("Total duration", fmtMs(event.totalDurationMs))}
                ${renderField("Queue position", event.queuePosition)}
                ${renderField("Queued", String(event.queued))}
                ${renderField("Reference type", event.referenceType)}
                ${renderField("Fallback from", event.fallbackFromModel)}
                ${renderField("Asset type", event.assetType)}
                ${renderField("Style", event.style)}
                ${renderField("Image size", imageSize)}
                ${renderField("Sprite grid", spriteGrid)}
                ${renderField("Image count", event.numImages)}
                ${renderField("Result URL", event.url, { link: true })}
              </div>
              ${
                hasValue(event.prompt)
                  ? `
                    <div class="info-card compact">
                      <span class="subtle">Prompt</span>
                      <p class="prompt-text">${escapeHtml(event.prompt)}</p>
                    </div>
                  `
                  : ""
              }
              ${
                hasValue(event.errorMessage)
                  ? `
                    <div class="info-card compact error-card">
                      <span class="subtle">Error message</span>
                      <p class="prompt-text">${escapeHtml(event.errorMessage)}</p>
                    </div>
                  `
                  : ""
              }
              ${renderEventMetadata(event)}
            </div>
          </details>
        `;
      }

      function renderEvidenceList(events, emptyMessage) {
        if (!Array.isArray(events) || !events.length) {
          return `<div class="empty">${escapeHtml(emptyMessage)}</div>`;
        }

        return `
          <div class="event-list">
            ${events.map((event) => renderEvidenceEvent(event)).join("")}
          </div>
        `;
      }

      function renderStageEvidence(stage, evidenceEvents) {
        const sourceEventIds = new Set(stage.sourceEventIds ?? []);
        const stageEvents = Array.isArray(evidenceEvents)
          ? evidenceEvents.filter((event) => sourceEventIds.has(event.eventId))
          : [];

        return `
          <div class="subtle">
            Start: ${stage.startedAt ? fmt(stage.startedAt) : "-"}<br />
            End: ${stage.endedAt ? fmt(stage.endedAt) : "-"}<br />
            Evidence events: ${stage.sourceEventIds.length}
          </div>
          <details class="nested-details">
            <summary>Show evidence events (${stageEvents.length})</summary>
            ${renderEvidenceList(stageEvents, "No stage-level evidence event details were included.")}
          </details>
        `;
      }

      function renderRunEvidence(run) {
        const evidenceEvents = Array.isArray(run.evidenceEvents) ? run.evidenceEvents : [];

        return `
          <details>
            <summary>Evidence timeline (${evidenceEvents.length})</summary>
            ${renderEvidenceList(
              evidenceEvents,
              "No evidence event details were included in this snapshot.",
            )}
          </details>
        `;
      }

      function renderSummary(report) {
        const cards = [
          ["Total runs", report.summary.totalRuns],
          ["Completed", report.summary.completedRuns],
          ["Failed", report.summary.failedRuns],
          ["Handed off", report.summary.handedOffRuns],
          ["Queue timeouts", report.summary.queueTimeouts],
          ["Incidents", report.incidents.length],
        ];

        summaryNode.innerHTML = cards
          .map(
            ([label, value]) => `
              <article class="summary-card">
                <div class="subtle">${label}</div>
                <strong>${value}</strong>
              </article>
            `,
          )
          .join("");
      }

      function renderAlerts(report) {
        const alerts = [];

        if (report.query.source === "sample") {
          alerts.push(`
            <div class="alert">
              <strong>Sample snapshot is deployed</strong>
              This page is currently showing bundled demo data, not live Cloud Logging results. Run the workflow with <code>snapshot_source=gcp</code> to publish real logs.
            </div>
          `);
        }

        if (report.diagnostics?.fetchedEntryCount === 0) {
          alerts.push(`
            <div class="alert">
              <strong>Cloud Logging returned zero entries</strong>
              The current service, region, or time window did not produce matching logs for this snapshot.
            </div>
          `);
        }

        alertsNode.innerHTML = alerts.join("");
      }

      function renderMeta(report) {
        const meta = [
          ["Generated", fmt(report.generatedAt)],
          ["Coverage start", fmt(report.coveredFrom)],
          ["Coverage end", fmt(report.coveredTo)],
          ["Source", report.query.source],
          ["Service", report.query.serviceName ?? "sample-service"],
          ["Project", report.query.projectId ?? "sample-project"],
          ["Location", report.query.location ?? "not-set"],
        ];

        metaNode.innerHTML = meta
          .map(
            ([label, value]) => `
              <article class="meta-card">
                <div class="subtle">${label}</div>
                <strong>${value}</strong>
              </article>
            `,
          )
          .join("");
      }

      function renderDiagnostics(report) {
        const diagnostics = report.diagnostics;
        if (!diagnostics) {
          diagnosticsNode.innerHTML =
            '<div class="empty">No diagnostics were included in this snapshot payload.</div>';
          diagnosticNotesNode.innerHTML = "";
          return;
        }

        const cards = [
          ["Fetched entries", diagnostics.fetchedEntryCount],
          ["Parsed events", diagnostics.parsedEventCount],
          ["Recognized events", diagnostics.recognizedEventCount],
          ["Correlated runs", diagnostics.runCount],
          ["Fetch strategy", diagnostics.fetchStrategy],
        ];

        diagnosticsNode.innerHTML = cards
          .map(
            ([label, value]) => `
              <article class="summary-card">
                <div class="subtle">${label}</div>
                <strong>${value}</strong>
              </article>
            `,
          )
          .join("");

        diagnosticNotesNode.innerHTML = diagnostics.notes.length
          ? diagnostics.notes
              .map((note) => `<div class="empty">${note}</div>`)
              .join("")
          : "";
      }

      function renderIncidents(report) {
        if (!report.incidents.length) {
          incidentsNode.innerHTML =
            '<div class="empty">No incidents were classified for this snapshot.</div>';
          return;
        }

        incidentsNode.innerHTML = report.incidents
          .map(
            (incident) => `
              <a
                class="incident incident-link"
                data-severity="${incident.severity}"
                href="#${escapeHtml(toRunAnchorId(incident.runId))}"
              >
                <div class="pill ${incident.severity}">${escapeHtml(translateSeverity(incident.severity))}</div>
                <h3>${escapeHtml(translateIncidentSummary(incident.summary))}</h3>
                <p class="subtle">${escapeHtml(translateIncidentExplanation(incident.explanation))}</p>
                <p class="subtle"><strong>대상 Run:</strong> <code>${escapeHtml(incident.runId)}</code></p>
              </a>
            `,
          )
          .join("");
      }

      function renderRuns(report) {
        if (!report.runs.length) {
          const diagnostics = report.diagnostics;
          const reason =
            diagnostics?.fetchedEntryCount === 0
              ? "Cloud Logging returned zero entries for this query. Check service name, region, and time window."
              : diagnostics?.recognizedEventCount === 0
                ? "Logs were fetched, but the parser recognized zero Agent8 events. Live log patterns likely differ from the current parser rules."
                : "No runs were found for the selected window.";

          runsNode.innerHTML =
            `<div class="empty">${reason}</div>`;
          return;
        }

        runsNode.innerHTML = report.runs
          .map((run) => {
            const resultUrl = isHttpUrl(run.resultUrl) ? run.resultUrl : null;
            const logsExplorerUrl = buildLogsExplorerUrl(run, report);

            return `
              <article class="run-card" id="${escapeHtml(toRunAnchorId(run.runId))}">
                <div class="run-head">
                  <div>
                    <div class="pill ${run.status === "failed" ? "critical" : run.status === "handed_off" ? "warning" : ""}">${labelCase(run.status)}</div>
                    <h3 class="run-title">${labelCase(run.toolFlow)}</h3>
                    <div class="subtle"><code>${escapeHtml(run.runId)}</code></div>
                  </div>
                  <div class="subtle">
                    Started: ${fmt(run.startedAt)}<br />
                    Ended: ${run.endedAt ? fmt(run.endedAt) : "-"}<br />
                    Total: ${fmtMs(run.totalDurationMs)}
                  </div>
                </div>

                <div class="run-meta">
                  <div>
                    <span class="subtle">Providers</span>
                    <strong>${run.providerChain.length ? escapeHtml(run.providerChain.join(" -> ")) : "-"}</strong>
                  </div>
                  <div>
                    <span class="subtle">Bottleneck</span>
                    <strong>${run.bottleneckStage ? `${labelCase(run.bottleneckStage)} (${fmtMs(run.bottleneckDurationMs)})` : "-"}</strong>
                  </div>
                  <div>
                    <span class="subtle">Operation ID</span>
                    <strong><code>${escapeHtml(run.operationId ?? "-")}</code></strong>
                  </div>
                  <div>
                    <span class="subtle">fal.ai request_id</span>
                    <strong>${run.requestId ? `<code>${escapeHtml(run.requestId)}</code>` : "-"}</strong>
                  </div>
                  <div>
                    <span class="subtle">Failure / Timeout</span>
                    <strong>${run.failureKind ? labelCase(run.failureKind) : "-"}${run.timeoutKind ? `<br />${labelCase(run.timeoutKind)}` : ""}${run.httpStatusCode !== undefined ? `<br />HTTP ${run.httpStatusCode}` : ""}</strong>
                  </div>
                </div>

                ${(run.prompt || resultUrl)
                  ? `
                    <div class="run-content">
                      ${
                        run.prompt
                          ? `
                            <div class="info-card">
                              <span class="subtle">Prompt</span>
                              <p class="prompt-text">${escapeHtml(run.prompt)}</p>
                            </div>
                          `
                          : ""
                      }
                      ${
                        resultUrl
                          ? `
                            <div class="info-card">
                              <span class="subtle">Result asset</span>
                              <div>
                                <a class="result-link" href="${escapeHtml(resultUrl)}" target="_blank" rel="noreferrer">${escapeHtml(resultUrl)}</a>
                              </div>
                              ${
                                run.status === "completed"
                                  ? `
                                    <a href="${escapeHtml(resultUrl)}" target="_blank" rel="noreferrer">
                                      <img class="result-preview" src="${escapeHtml(resultUrl)}" alt="${escapeHtml(run.runId)} result preview" loading="lazy" />
                                    </a>
                                  `
                                  : ""
                              }
                            </div>
                          `
                          : ""
                      }
                    </div>
                  `
                  : ""
                }

                ${(resultUrl || logsExplorerUrl)
                  ? `
                    <div class="run-links">
                      ${
                        resultUrl
                          ? `<a href="${escapeHtml(resultUrl)}" target="_blank" rel="noreferrer">Open result URL</a>`
                          : ""
                      }
                      ${
                        logsExplorerUrl
                          ? `<a href="${escapeHtml(logsExplorerUrl)}" target="_blank" rel="noreferrer">Open GCP logs</a>`
                          : ""
                      }
                    </div>
                  `
                  : ""
                }

                ${renderRunEvidence(run)}

                <details>
                  <summary>Stages (${run.stages.length})</summary>
                  <div class="stage-list">
                    ${run.stages
                      .map(
                        (stage) => `
                          <div class="stage-card">
                            <span class="subtle">${labelCase(stage.stage)}</span>
                            <strong>${fmtMs(stage.durationMs)}</strong>
                            ${renderStageEvidence(stage, run.evidenceEvents)}
                          </div>
                        `,
                      )
                      .join("")}
                  </div>
                </details>
              </article>
            `;
          })
          .join("");
      }

      async function boot() {
        try {
          const response = await fetch("./data/report.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Failed to load snapshot: ${response.status}`);
          }

          const report = await response.json();
          renderMeta(report);
          renderAlerts(report);
          renderSummary(report);
          renderDiagnostics(report);
          renderIncidents(report);
          renderRuns(report);
        } catch (error) {
          alertsNode.innerHTML = "";
          summaryNode.innerHTML =
            '<div class="empty">Snapshot data is not available yet. Run the snapshot build script or GitHub Actions workflow first.</div>';
          diagnosticsNode.innerHTML = "";
          diagnosticNotesNode.innerHTML = "";
          incidentsNode.innerHTML = "";
          runsNode.innerHTML = "";
          metaNode.innerHTML = `
            <article class="meta-card">
              <div class="subtle">Status</div>
              <strong>Snapshot missing</strong>
            </article>
          `;
          console.error(error);
        }
      }

      boot();
    </script>
  </body>
</html>
