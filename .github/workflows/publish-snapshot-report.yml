name: Publish Snapshot Report

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      snapshot_source:
        description: Snapshot source
        required: false
        default: gcp
        type: choice
        options:
          - sample
          - gcp
      snapshot_from:
        description: Optional ISO8601 start timestamp
        required: false
        type: string
      snapshot_to:
        description: Optional ISO8601 end timestamp
        required: false
        type: string
      snapshot_limit:
        description: Optional entry limit
        required: false
        type: string
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SNAPSHOT_PROJECT_ID: ${{ vars.SNAPSHOT_PROJECT_ID || 'agent8-455106' }}
      SNAPSHOT_SERVICE_NAME: ${{ vars.SNAPSHOT_SERVICE_NAME }}
      SNAPSHOT_LOCATION: ${{ vars.SNAPSHOT_LOCATION }}
      SNAPSHOT_FROM: ${{ github.event.inputs.snapshot_from || vars.SNAPSHOT_FROM }}
      SNAPSHOT_TO: ${{ github.event.inputs.snapshot_to || vars.SNAPSHOT_TO }}
      SNAPSHOT_LIMIT: ${{ github.event.inputs.snapshot_limit || vars.SNAPSHOT_LIMIT || '1000' }}
      SNAPSHOT_TOOL_FLOWS: ${{ vars.SNAPSHOT_TOOL_FLOWS }}
      HAS_GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY != '' }}
      HAS_WIF_CONFIG: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT != '' }}
      REPO_SNAPSHOT_SOURCE: ${{ vars.SNAPSHOT_SOURCE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Resolve snapshot source
        shell: bash
        run: |
          SOURCE="${{ github.event.inputs.snapshot_source }}"
          HAS_GCP_CONFIG="false"

          if [ -n "${SNAPSHOT_PROJECT_ID}" ] && [ -n "${SNAPSHOT_SERVICE_NAME}" ]; then
            if [ "${HAS_WIF_CONFIG}" = "true" ] || [ "${HAS_GCP_SERVICE_ACCOUNT_KEY}" = "true" ]; then
              HAS_GCP_CONFIG="true"
            fi
          fi

          if [ -z "${SOURCE}" ]; then
            if [ "${{ github.event_name }}" = "push" ] && [ "${HAS_GCP_CONFIG}" = "true" ]; then
              SOURCE="gcp"
            elif [ -n "${REPO_SNAPSHOT_SOURCE}" ]; then
              SOURCE="${REPO_SNAPSHOT_SOURCE}"
            elif [ "${HAS_GCP_CONFIG}" = "true" ]; then
              SOURCE="gcp"
            else
              SOURCE="sample"
            fi
          fi

          echo "SNAPSHOT_SOURCE=${SOURCE}" >> "${GITHUB_ENV}"
          echo "Resolved snapshot source: ${SOURCE}"

      - name: Authenticate to Google Cloud with Workload Identity Federation
        if: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.SNAPSHOT_PROJECT_ID || 'agent8-455106' }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Authenticate to Google Cloud with service account key fallback
        if: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER == '' && env.HAS_GCP_SERVICE_ACCOUNT_KEY == 'true' }}
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.SNAPSHOT_PROJECT_ID || 'agent8-455106' }}
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Validate snapshot configuration
        run: |
          if [ "${SNAPSHOT_SOURCE}" = "gcp" ]; then
            test -n "${SNAPSHOT_PROJECT_ID}" || { echo "SNAPSHOT_PROJECT_ID is required for gcp snapshots."; exit 1; }
            test -n "${SNAPSHOT_SERVICE_NAME}" || { echo "SNAPSHOT_SERVICE_NAME is required for gcp snapshots."; exit 1; }
            if [ -z "${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] && [ "${HAS_GCP_SERVICE_ACCOUNT_KEY}" != "true" ]; then
              echo "GCP auth is not configured. Set WIF vars or GCP_SERVICE_ACCOUNT_KEY."
              exit 1
            fi
          fi

      - name: Print resolved snapshot configuration
        run: |
          echo "SNAPSHOT_SOURCE=${SNAPSHOT_SOURCE}"
          echo "SNAPSHOT_PROJECT_ID=${SNAPSHOT_PROJECT_ID}"
          echo "SNAPSHOT_SERVICE_NAME=${SNAPSHOT_SERVICE_NAME}"
          echo "SNAPSHOT_LOCATION=${SNAPSHOT_LOCATION}"
          echo "SNAPSHOT_FROM=${SNAPSHOT_FROM}"
          echo "SNAPSHOT_TO=${SNAPSHOT_TO}"
          echo "SNAPSHOT_LIMIT=${SNAPSHOT_LIMIT}"

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: Build snapshot report
        run: npm run snapshot:build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
